<svg viewBox="0 0 260 68" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="dGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7a12a8" stop-opacity="0.9">
        <animate attributeName="stop-color" values="#7a12a8;#450064;#363636;#7a12a8" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#450064" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="dStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="dSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="dBlur"><feGaussianBlur stdDeviation="18"/></filter>
    <clipPath id="dClip"><rect x="4" y="4" width="252" height="60" rx="18"/></clipPath>
  </defs>

  <circle cx="60" cy="34" r="60" fill="url(#dGlow)" filter="url(#dBlur)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>

  <rect x="4" y="4" width="252" height="60" rx="18"
        fill="url(#dFill)" stroke="url(#dStroke)" stroke-width="1.2"/>
  <rect x="4" y="4" width="252" height="1.5" rx="0.75" fill="#ffffff" opacity="0.35"/>

  <g clip-path="url(#dClip)">
    <rect x="-60" y="4" width="60" height="60" fill="url(#dSweep)" transform="skewX(-18)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="420 0" dur="3.5s" repeatCount="indefinite" additive="sum"/>
    </rect>
  </g>

  <g transform="translate(26,20)" fill="#ffffff">
    <path d="M23.4 2.9C21.6 2.1 19.7 1.5 17.7 1.1c-.25.45-.53 1.05-.73 1.53-2.1-.32-4.2-.32-6.27 0-.2-.48-.5-1.08-.74-1.53-2 .4-3.9 1-5.7 1.8C1 8.6.1 14.1.5 19.5c2.3 1.7 4.5 2.7 6.7 3.4.55-.75 1.03-1.55 1.44-2.4-.8-.3-1.55-.66-2.27-1.1.19-.14.38-.29.56-.44 4.36 2 9.1 2 13.4 0 .19.15.37.3.56.44-.72.44-1.48.8-2.27 1.1.4.85.9 1.65 1.44 2.4 2.2-.7 4.4-1.7 6.7-3.4.5-6.2-.9-11.7-3.36-16.6ZM9.7 16.1c-1.3 0-2.4-1.25-2.4-2.77 0-1.53 1.06-2.78 2.4-2.78 1.34 0 2.42 1.26 2.4 2.78 0 1.52-1.06 2.77-2.4 2.77Zm9.7 0c-1.3 0-2.4-1.25-2.4-2.77 0-1.53 1.06-2.78 2.4-2.78 1.34 0 2.42 1.26 2.4 2.78 0 1.52-1.06 2.77-2.4 2.77Z"/>
  </g>

  <text x="150" y="41" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="19" font-weight="600" fill="#f5f2f7" letter-spacing="0.3">Discord</text>
</svg>
