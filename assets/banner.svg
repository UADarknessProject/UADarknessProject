<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1c1c"/>
      <stop offset="1" stop-color="#363636"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7a12a8" stop-opacity="0.85">
        <animate attributeName="stop-color" values="#7a12a8;#a259c6;#450064;#7a12a8" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#450064" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#450064" stop-opacity="0.7">
        <animate attributeName="stop-color" values="#450064;#7a12a8;#363636;#450064" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#450064" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="glassStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurBig"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="blurGlass"><feGaussianBlur stdDeviation="0.5"/></filter>
    <clipPath id="clip"><rect x="0" y="0" width="1200" height="280"/></clipPath>
    <clipPath id="panelClip"><rect x="120" y="55" width="960" height="170" rx="24"/></clipPath>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <circle cx="160" cy="60" r="180" fill="url(#blob1)" filter="url(#blurBig)">
      <animate attributeName="cx" values="160;220;160" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.55;0.9" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="230" r="220" fill="url(#blob2)" filter="url(#blurBig)">
      <animate attributeName="cx" values="1080;1000;1080" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="260" r="140" fill="url(#blob1)" filter="url(#blurBig)" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.55;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="120" y="55" width="960" height="170" rx="24"
        fill="url(#glassFill)" stroke="url(#glassStroke)" stroke-width="1.2"
        filter="url(#blurGlass)"/>
  <rect x="120" y="55" width="960" height="2" fill="#ffffff" opacity="0.35"/>

  <g clip-path="url(#panelClip)">
    <rect x="-260" y="55" width="260" height="170" fill="url(#sweep)" transform="skewX(-18)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="1500 0" dur="5s" repeatCount="indefinite" additive="sum"/>
    </rect>
  </g>

  <text x="600" y="128" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700"
        fill="#f5f2f7" letter-spacing="1">DarknessProject</text>
  <text x="600" y="165" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif" font-size="17"
        fill="#c9bcd4" letter-spacing="2">HOSTING &amp; GAME SERVERS PLATFORM</text>
  <rect x="540" y="182" width="120" height="2" fill="#a259c6" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
