<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1c1c"/>
      <stop offset="1" stop-color="#363636"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7a12a8" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#450064" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#450064" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#450064" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="glassStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blurBig"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="blurGlass"><feGaussianBlur stdDeviation="0.5"/></filter>
    <clipPath id="clip"><rect x="0" y="0" width="1200" height="280" rx="0"/></clipPath>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <circle cx="160" cy="60" r="180" fill="url(#blob1)" filter="url(#blurBig)"/>
    <circle cx="1080" cy="230" r="220" fill="url(#blob2)" filter="url(#blurBig)"/>
    <circle cx="620" cy="260" r="140" fill="url(#blob1)" filter="url(#blurBig)" opacity="0.5"/>
  </g>

  <rect x="120" y="55" width="960" height="170" rx="24"
        fill="url(#glassFill)" stroke="url(#glassStroke)" stroke-width="1.2"
        filter="url(#blurGlass)"/>
  <rect x="120" y="55" width="960" height="2" fill="#ffffff" opacity="0.35"/>

  <text x="600" y="128" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700"
        fill="#f5f2f7" letter-spacing="1">DarknessProject</text>
  <text x="600" y="165" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif" font-size="17"
        fill="#c9bcd4" letter-spacing="2">HOSTING &amp; GAME SERVERS PLATFORM</text>
  <rect x="540" y="182" width="120" height="2" fill="#a259c6" opacity="0.6"/>
</svg>
