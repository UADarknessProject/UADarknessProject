<svg viewBox="0 0 260 68" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="tGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7a12a8" stop-opacity="0.9">
        <animate attributeName="stop-color" values="#7a12a8;#450064;#363636;#7a12a8" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#450064" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="tStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="tSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="tBlur"><feGaussianBlur stdDeviation="18"/></filter>
    <clipPath id="tClip"><rect x="4" y="4" width="252" height="60" rx="18"/></clipPath>
  </defs>

  <circle cx="200" cy="34" r="60" fill="url(#tGlow)" filter="url(#tBlur)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <rect x="4" y="4" width="252" height="60" rx="18"
        fill="url(#tFill)" stroke="url(#tStroke)" stroke-width="1.2"/>
  <rect x="4" y="4" width="252" height="1.5" rx="0.75" fill="#ffffff" opacity="0.35"/>

  <g clip-path="url(#tClip)">
    <rect x="-60" y="4" width="60" height="60" fill="url(#tSweep)" transform="skewX(-18)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="420 0" dur="3.5s" begin="1.2s" repeatCount="indefinite" additive="sum"/>
    </rect>
  </g>

  <g transform="translate(30,19)" fill="#ffffff">
    <path d="M22.7 1.4 1.2 9.9c-1.4.57-1.4 1.36-.25 1.72l5.3 1.66 2.05 6.3c.25.68.13.95.85.95.55 0 .8-.25 1.1-.55l2.6-2.53 5.4 4c1 .55 1.7.27 1.95-.92l3.55-16.7c.36-1.46-.55-2.12-1.55-1.7Zm-13.4 12.1L18.1 6c.4-.24.77.06.44.33l-7.9 7.1-.3 4.2-1.4-5.13Z"/>
  </g>

  <text x="153" y="41" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="19" font-weight="600" fill="#f5f2f7" letter-spacing="0.3">Telegram</text>
</svg>
